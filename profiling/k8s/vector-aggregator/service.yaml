apiVersion: v1
kind: Service
metadata:
  name: vector-aggregator
  namespace: profiling
  labels:
    app.kubernetes.io/name: vector-aggregator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vector-aggregator
  ports:
    - name: vector
      port: 6000
      targetPort: 6000
---
apiVersion: v1
kind: Service
metadata:
  name: vector-aggregator-metrics
  namespace: profiling
  labels:
    app.kubernetes.io/name: vector-aggregator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9598"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vector-aggregator
  ports:
    - name: metrics
      port: 9598
      targetPort: 9598
