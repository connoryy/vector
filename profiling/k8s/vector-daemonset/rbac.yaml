apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector-daemonset
  namespace: profiling
  labels:
    app.kubernetes.io/name: vector-daemonset
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-daemonset
  labels:
    app.kubernetes.io/name: vector-daemonset
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-daemonset
  labels:
    app.kubernetes.io/name: vector-daemonset
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-daemonset
subjects:
  - kind: ServiceAccount
    name: vector-daemonset
    namespace: profiling
