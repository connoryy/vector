apiVersion: v1
kind: Service
metadata:
  name: vector-daemonset-metrics
  namespace: profiling
  labels:
    app.kubernetes.io/name: vector-daemonset
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9598"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: vector-daemonset
  ports:
    - name: metrics
      port: 9598
      targetPort: 9598
