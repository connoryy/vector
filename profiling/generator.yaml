data_dir: /tmp/vector-gen-data

sources:
  generate:
    type: demo_logs
    format: json
    interval: 0.001  # ~1000 events/second

transforms:
  # Make events look like kubernetes_logs with a valid SLS service.1 envelope in .message.
  # Without this, the `in` exclusive_route in the aggregator drops every event immediately
  # because demo_logs sets source_type="demo_logs" which matches no route.
  make_sls:
    type: remap
    inputs: [generate]
    source: |-
      .source_type = "kubernetes_logs"
      # .sls metadata is captured by sls-envelopes-unsafe and carried through to the
      # output event. apolloEntityId/product/productVersion are required by the
      # sls-count-metric and sls-bytes-count-metric log_to_metric transforms downstream.
      .sls = {
        "apolloEntityId": "profiling-test",
        "product": "profiling",
        "productVersion": "1.0",
        "service": "profiling-test"
      }
      .message = encode_json({
        "type": "service.1",
        "time": format_timestamp!(now(), format: "%+"),
        "payload": {"message": .message}
      })

sinks:
  to_aggregator:
    type: vector
    inputs: [make_sls]
    address: "127.0.0.1:6000"
    tls:
      enabled: true
      ca_file: /etc/ssl/rubix-ca/ca.pem
      crt_file: /tmp/profiling-certs/client.crt
      key_file: /tmp/profiling-certs/client.key
      verify_hostname: false
