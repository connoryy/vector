name: Build and release component-probes binary

on:
  push:
    tags:
      - 'component-probes-v*'
    branches:
      - 'connor/local-vector-profiling'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          # Scope cache to this workflow so it doesn't collide with other builds
          key: component-probes

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build component-probes binary
        run: cargo build --release --features component-probes

      - name: Package binary
        run: tar -czf vector-component-probes-linux-x86_64.tar.gz -C target/release vector

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: vector-component-probes-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
