name: Build and release component-probes binary

on:
  push:
    tags:
      - 'component-probes-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'component-probes'
      tag:
        description: 'Release tag to create (e.g. component-probes-v0.49.3). Leave empty for no release.'
        required: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-musl
            target-feature: target-x86_64-unknown-linux-musl
            artifact: vector-component-probes-linux-x86_64.tar.gz
          - runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            target-feature: target-aarch64-unknown-linux-musl
            artifact: vector-component-probes-linux-arm64.tar.gz
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: component-probes-${{ matrix.target }}

      - name: Bootstrap environment
        run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh

      - name: Install protoc
        run: sudo bash scripts/environment/install-protoc.sh

      - name: Install musl toolchain and kernel headers
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools linux-libc-dev libsasl2-dev
          # musl-gcc uses a spec file with -nostdinc that restricts includes to
          # the musl sysroot (/usr/include/<arch>-linux-musl). Kernel headers
          # from linux-libc-dev live in /usr/include/linux/ (the glibc path).
          # Symlink them into the musl include directory so musl-gcc finds them.
          ARCH="$(uname -m)"
          MUSL_INCLUDE="/usr/include/${ARCH}-linux-musl"
          sudo mkdir -p "$MUSL_INCLUDE"
          sudo ln -sf /usr/include/linux "$MUSL_INCLUDE/linux"
          sudo ln -sf /usr/include/asm-generic "$MUSL_INCLUDE/asm-generic"
          if [ -d "/usr/include/${ARCH}-linux-gnu/asm" ]; then
            sudo ln -sf "/usr/include/${ARCH}-linux-gnu/asm" "$MUSL_INCLUDE/asm"
          elif [ -d /usr/include/asm ]; then
            sudo ln -sf /usr/include/asm "$MUSL_INCLUDE/asm"
          fi
          # sasl2 headers live in /usr/include/sasl/ - symlink for musl visibility
          if [ -d /usr/include/sasl ]; then
            sudo ln -sf /usr/include/sasl "$MUSL_INCLUDE/sasl"
          fi
          # musl-tools only provides musl-gcc, not musl-g++. librdkafka's cmake
          # build needs a C++ compiler. Create a musl-g++ wrapper that calls g++
          # with the musl spec file.
          SPEC_FILE="/usr/lib/${ARCH}-linux-musl/musl-gcc.specs"
          cat <<WRAPPER | sudo tee /usr/local/bin/musl-g++ > /dev/null
          #!/bin/sh
          exec g++ "\$@" -specs "$SPEC_FILE" -nostdinc -isystem "$MUSL_INCLUDE" -isystem /include
          WRAPPER
          sudo chmod +x /usr/local/bin/musl-g++

      - name: Add musl Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build component-probes binary
        run: cargo build --release --no-default-features --features "${{ matrix.target-feature }},component-probes,vendored" --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
          CARGO_PROFILE_RELEASE_DEBUG: "true"
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Package binary
        run: tar -czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release vector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload to GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release (workflow_dispatch)
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.ref || 'component-probes' }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
